# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - pomo

on:
  push:
    branches:
      - login
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm --prefix src/api install
          npm run build:app --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F3918C90B17A4710997C242E97542E42 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4FEAF97244504C64BDFB0E963F0E9B71 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_91E2859E0D874D528AC7A524C836F8B3 }}

      - name: Stabilize App Service SCM before deploy
        run: |
          # Mitigate transient SCM/Kudu restarts after recent platform/management operations.
          sleep 30

      - name: Deploy to Azure Web App (attempt 1)
        id: deploy-to-webapp-attempt-1
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pomo'
          slot-name: 'persistance'
          package: .

      - name: Backoff before deploy retry 2
        if: steps.deploy-to-webapp-attempt-1.outcome == 'failure'
        run: sleep 45

      - name: Deploy to Azure Web App (attempt 2)
        id: deploy-to-webapp-attempt-2
        if: steps.deploy-to-webapp-attempt-1.outcome == 'failure'
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pomo'
          slot-name: 'persistance'
          package: .

      - name: Backoff before deploy retry 3
        if: steps.deploy-to-webapp-attempt-1.outcome == 'failure' && steps.deploy-to-webapp-attempt-2.outcome == 'failure'
        run: sleep 90

      - name: Deploy to Azure Web App (attempt 3)
        id: deploy-to-webapp-attempt-3
        if: steps.deploy-to-webapp-attempt-1.outcome == 'failure' && steps.deploy-to-webapp-attempt-2.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pomo'
          slot-name: 'persistance'
          package: .

      - name: Fail if all deploy attempts failed
        if: steps.deploy-to-webapp-attempt-1.outcome == 'failure' && steps.deploy-to-webapp-attempt-2.outcome == 'failure' && steps.deploy-to-webapp-attempt-3.outcome == 'failure'
        run: |
          echo "All deploy attempts failed after retries."
          exit 1
          