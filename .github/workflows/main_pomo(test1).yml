# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - pomo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix src/api ci

      - name: Build frontend and API
        run: |
          npm run build
          npm --prefix src/api run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy
          mkdir -p deploy/dist
          mkdir -p deploy/src/api
          cp -R dist/. deploy/dist/
          cp -R src/api/dist deploy/src/api/dist
          cp src/api/package.json deploy/src/api/package.json
          cp src/api/package-lock.json deploy/src/api/package-lock.json
          cp src/api/tsconfig.json deploy/src/api/tsconfig.json
          cp src/api/.funcignore deploy/src/api/.funcignore || true
          cp package.json deploy/package.json

      - name: Install API production dependencies in deploy package
        run: |
          npm --prefix deploy/src/api ci --omit=dev

      - name: Verify deploy package contents
        run: |
          test -f deploy/dist/index.html
          test -f deploy/src/api/dist/server.js
          test -f deploy/src/api/node_modules/express/package.json

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_565BE6C6A9EA484A83FFD559E2AC7D69 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D973C448A770474B91CA1E69470D1E7F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_33D8C6649C79408B9268589A55FF4C4F }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pomo'
          slot-name: 'test1'
          package: .
          